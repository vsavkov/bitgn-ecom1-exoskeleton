<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .gate { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; }
      .commit { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .sweep { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .text { fill: #111827; font-size: 16px; font-weight: 650; }
      .sub { fill: #475569; font-size: 13px; }
      .label { fill: #64748b; font-size: 12px; font-weight: 650; }
      .line { fill: none; stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text x="40" y="42" font-size="24" font-weight="750" fill="#111827">Blind-prod commit/defer loop</text>
  <text x="40" y="65" font-size="14" fill="#64748b">Score is unavailable in-window, so self-verification decides when to lock a trial.</text>

  <rect class="box" x="55" y="145" width="170" height="62" rx="8"/>
  <text class="text" x="140" y="173" text-anchor="middle">Start run</text>
  <text class="sub" x="140" y="193" text-anchor="middle">100 trials</text>

  <rect class="box" x="275" y="145" width="190" height="62" rx="8"/>
  <text class="text" x="370" y="173" text-anchor="middle">Pass 1</text>
  <text class="sub" x="370" y="193" text-anchor="middle">dry-run all tasks</text>

  <rect class="gate" x="515" y="145" width="190" height="62" rx="8"/>
  <text class="text" x="610" y="173" text-anchor="middle">High confidence?</text>
  <text class="sub" x="610" y="193" text-anchor="middle">from selfVerify</text>

  <rect class="commit" x="755" y="145" width="175" height="62" rx="8"/>
  <text class="text" x="842" y="173" text-anchor="middle">Commit now</text>
  <text class="sub" x="842" y="193" text-anchor="middle">trial locks</text>

  <rect class="box" x="515" y="285" width="190" height="62" rx="8"/>
  <text class="text" x="610" y="313" text-anchor="middle">Deferred queue</text>
  <text class="sub" x="610" y="333" text-anchor="middle">keep trial open</text>

  <rect class="box" x="275" y="285" width="190" height="62" rx="8"/>
  <text class="text" x="370" y="313" text-anchor="middle">repairHint</text>
  <text class="sub" x="370" y="333" text-anchor="middle">targeted directive</text>

  <rect class="box" x="55" y="285" width="170" height="62" rx="8"/>
  <text class="text" x="140" y="313" text-anchor="middle">Reattempt</text>
  <text class="sub" x="140" y="333" text-anchor="middle">dry-run again</text>

  <rect class="gate" x="55" y="425" width="170" height="62" rx="8"/>
  <text class="text" x="140" y="453" text-anchor="middle">Raised?</text>
  <text class="sub" x="140" y="473" text-anchor="middle">confidence check</text>

  <rect class="commit" x="275" y="425" width="190" height="62" rx="8"/>
  <text class="text" x="370" y="453" text-anchor="middle">Commit repair</text>
  <text class="sub" x="370" y="473" text-anchor="middle">trial locks</text>

  <rect class="sweep" x="515" y="425" width="190" height="62" rx="8"/>
  <text class="text" x="610" y="453" text-anchor="middle">Final sweep</text>
  <text class="sub" x="610" y="473" text-anchor="middle">best available answer</text>

  <rect class="box" x="755" y="425" width="175" height="62" rx="8"/>
  <text class="text" x="842" y="453" text-anchor="middle">Submit run</text>
  <text class="sub" x="842" y="473" text-anchor="middle">no blanks</text>

  <path class="line" d="M 225 176 L 268 176"/>
  <path class="line" d="M 465 176 L 508 176"/>
  <path class="line" d="M 705 176 L 748 176"/>
  <text class="label" x="730" y="164">yes</text>
  <path class="line" d="M 610 207 L 610 278"/>
  <text class="label" x="622" y="247">no</text>
  <path class="line" d="M 515 316 L 472 316"/>
  <path class="line" d="M 275 316 L 232 316"/>
  <path class="line" d="M 140 347 L 140 418"/>
  <path class="line" d="M 225 456 L 268 456"/>
  <text class="label" x="248" y="444">yes</text>
  <path class="line" d="M 465 456 L 508 456"/>
  <text class="label" x="489" y="444">no</text>
  <path class="line" d="M 705 456 L 748 456"/>
  <path class="line" d="M 842 207 L 842 418"/>
  <path class="line" d="M 370 487 L 370 525 L 842 525 L 842 494"/>
</svg>
