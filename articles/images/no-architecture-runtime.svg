<svg xmlns="http://www.w3.org/2000/svg" width="980" height="820" viewBox="0 0 980 820" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .model { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; }
      .code { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .out { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .text { fill: #111827; font-size: 17px; font-weight: 650; }
      .sub { fill: #475569; font-size: 13px; }
      .line { fill: none; stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="980" height="820"/>
  <text x="40" y="42" font-size="24" font-weight="750" fill="#111827">No-architecture runtime shape</text>
  <text x="40" y="65" font-size="14" fill="#64748b">One model loop; deterministic code appears only where the benchmark forces it.</text>

  <rect class="box" x="350" y="95" width="280" height="70" rx="8"/>
  <text class="text" x="490" y="125" text-anchor="middle">Task instruction</text>
  <text class="sub" x="490" y="148" text-anchor="middle">user request from BitGN</text>

  <rect class="code" x="350" y="205" width="280" height="78" rx="8"/>
  <text class="text" x="490" y="235" text-anchor="middle">Deterministic bootstrap</text>
  <text class="sub" x="490" y="258" text-anchor="middle">/AGENTS.MD, /docs, /bin/id, /bin/date</text>

  <rect class="code" x="350" y="325" width="280" height="78" rx="8"/>
  <text class="text" x="490" y="355" text-anchor="middle">Workspace mechanics</text>
  <text class="sub" x="490" y="378" text-anchor="middle">SQL on/off, yes/no tokens, layout</text>

  <rect class="code" x="350" y="445" width="280" height="78" rx="8"/>
  <text class="text" x="490" y="475" text-anchor="middle">classifyTask</text>
  <text class="sub" x="490" y="498" text-anchor="middle">rule route and focused directive</text>

  <rect class="model" x="350" y="565" width="280" height="78" rx="8"/>
  <text class="text" x="490" y="595" text-anchor="middle">One model session</text>
  <text class="sub" x="490" y="618" text-anchor="middle">native tool-calling loop</text>

  <rect class="box" x="55" y="550" width="250" height="108" rx="8"/>
  <text class="text" x="180" y="585" text-anchor="middle">ECOM runtime tools</text>
  <text class="sub" x="180" y="611" text-anchor="middle">read, list, exec, write, answer</text>
  <text class="sub" x="180" y="633" text-anchor="middle">filesystem-shaped workspace</text>

  <rect class="code" x="675" y="550" width="250" height="108" rx="8"/>
  <text class="text" x="800" y="585" text-anchor="middle">Deterministic helpers</text>
  <text class="sub" x="800" y="611" text-anchor="middle">catalog, availability, fraud</text>
  <text class="sub" x="800" y="633" text-anchor="middle">dispatch, basket, cleanup</text>

  <rect class="box" x="350" y="700" width="280" height="70" rx="8"/>
  <text class="text" x="490" y="730" text-anchor="middle">report_completion</text>
  <text class="sub" x="490" y="753" text-anchor="middle">refs, format, confidence guards</text>

  <rect class="out" x="675" y="700" width="250" height="70" rx="8"/>
  <text class="text" x="800" y="730" text-anchor="middle">BitGN answer</text>
  <text class="sub" x="800" y="753" text-anchor="middle">outcome, message, refs</text>

  <rect class="box" x="55" y="700" width="250" height="70" rx="8"/>
  <text class="text" x="180" y="730" text-anchor="middle">Run artifacts</text>
  <text class="sub" x="180" y="753" text-anchor="middle">data/runs, generations.jsonl</text>

  <path class="line" d="M 490 165 L 490 198"/>
  <path class="line" d="M 490 283 L 490 318"/>
  <path class="line" d="M 490 403 L 490 438"/>
  <path class="line" d="M 490 523 L 490 558"/>
  <path class="line" d="M 350 604 L 313 604"/>
  <path class="line" d="M 630 604 L 667 604"/>
  <path class="line" d="M 490 643 L 490 693"/>
  <path class="line" d="M 630 735 L 667 735"/>
  <path class="dash" d="M 350 735 L 313 735"/>
</svg>
